services:
  integra-ng:
    build:
      context: .
      dockerfile: Dockerfile
    image: integra-ng:latest
    container_name: integra-ng
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTEGRA_NG_MCP_CATALOG_PATH: /app/dist/mcp/integra-ng-catalog.json
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
