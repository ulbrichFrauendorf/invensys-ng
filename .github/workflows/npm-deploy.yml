name: npm package and site deploy

on:
  workflow_dispatch:
    inputs:
      deploy-site:
        description: Deploy the Dockerized site to the SSH server
        type: boolean
        required: true
        default: true

  push:
    branches:
      - main
    tags:
      - "v*" # Runs only when a tag like v1.0.0 is pushed

  workflow_call:
    inputs:
      build-artifacts:
        type: boolean
        required: true
        default: false

# Required for OIDC trusted publishing
permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org/"

      - name: Install root dependencies
        run: npm install

      - name: Update version in package.json
        run: |
          cd projects/integra-ng
          npm version $VERSION --no-git-tag-version

      - name: Build package and site artifacts
        run: npm run build

      - name: Publish to NPM (OIDC)
        # NOTE: No NODE_AUTH_TOKEN env/secret needed when using OIDC trusted publishing
        run: |
          cd dist/integra-ng
          npm publish --access public

  deploy-site:
    if: always() && (github.event_name != 'workflow_dispatch' || inputs.deploy-site) && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read

    steps:
      - name: Deploy Docker site over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.INTEGRA_NG_SSH_HOST }}
          username: ${{ secrets.INTEGRA_NG_SSH_USER }}
          key: ${{ secrets.INTEGRA_NG_SSH_KEY }}
          port: ${{ secrets.INTEGRA_NG_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -eu

            APP_DIR="${{ secrets.INTEGRA_NG_APP_DIR || '/opt/integra-ng' }}"
            DEPLOY_REF="${{ github.sha }}"

            cd "$APP_DIR"
            git fetch --all --tags --prune
            git checkout --force "$DEPLOY_REF"
            docker compose up -d --build
            docker image prune -f
